schema_version: 3
name: "FAGAN"
slug: "fagan"
version: "0.2.0"
description: "FAGAN — strict adversarial code review for diffs and implementations. Named after Michael Fagan (IBM 1976, formal code inspection). Single GPT pass via codex CLI, structured JSON findings, convergence loop. Composes with codex-rescue or any implementer."
short_description: "FAGAN · diff-scoped code review via codex CLI"
author: "0xHoneyJar"
license: "MIT"
type: "skill-pack"
visibility: public

repository: https://github.com/0xHoneyJar/construct-fagan.git
aliases:
  legacy_slug: codex-review   # back-compat for installs that pinned the old slug

skills:
  - slug: reviewing-diffs
    path: skills/reviewing-diffs
  - slug: reviewing-files
    path: skills/reviewing-files

identity:
  persona: identity/persona.yaml
  expertise: identity/expertise.yaml

domain:
  - engineering
  - code-review
  - adversarial-review

expertise:
  - diff-scoped code review
  - structured-output review findings
  - codex CLI integration
  - convergence loop discipline

compose_with:
  - codex-rescue
  - artisan
  - flatline

events:
  emits:
    - codex-review.finding.created
    - codex-review.verdict.changed
    - codex-review.iteration.completed
  consumes:
    - implement.diff.created

golden_path:
  commands:
    - name: review-diff
      description: "Adversarial review of a unified diff"
      truename_map:
        diff_ready: /reviewing-diffs
    - name: review-files
      description: "Adversarial review of specific files (no diff context)"
      truename_map:
        files_specified: /reviewing-files

requirements:
  tools:
    - codex            # codex CLI (gpt-5.5 backend by default; override via CODEX_REVIEW_MODEL)
    - jq
    - bash >= 4
  env:
    - OPENAI_API_KEY
